<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aum Shop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>AUM</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="cart.html">Carrello 🛒 <span id="count">0</span> | €<span id="total">0</span></a>
  </nav>
</header>

<section class="hero">
  <h2>Grafiche & Handmade</h2>
  <p>Prodotti creativi, unici e fatti con stile.</p>
</section>

<section class="products">
  <h2>Prodotti</h2>

  <div class="grid">

    <div class="card">
      <img src="img/p1.jpg" class="product-img" alt="Prodotto 1">
      <h3>Prodotto 1</h3>
      <p class="price">€10</p>
      <button onclick="addToCart('Prodotto 1', 10, 'img/p1.jpg')">Aggiungi</button>
    </div>

    <div class="card">
      <img src="img/p2.jpg" class="product-img" alt="Prodotto 2">
      <h3>Prodotto 2</h3>
      <p class="price">€15</p>
      <button onclick="addToCart('Prodotto 2', 15, 'img/p2.jpg')">Aggiungi</button>
    </div>

    <div class="card">
      <img src="img/p3.jpg" class="product-img" alt="Prodotto 3">
      <h3>Prodotto 3</h3>
      <p class="price">€20</p>
      <button onclick="addToCart('Prodotto 3', 20, 'img/p3.jpg')">Aggiungi</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 AUM</p>
</footer>

<script src="script.js"></script>
</body>
</html>
